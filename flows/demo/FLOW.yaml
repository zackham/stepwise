name: demo
description: "From issue to deploy — a real dev workflow with AI review, config, and escalation"
author: stepwise

config:
  team_name:
    type: str
    default: "acme-eng"
    description: "Team name displayed in PR titles"
  reviewer_style:
    type: choice
    options: [thorough, quick]
    default: thorough
    description: "AI reviewer thoroughness"

steps:
  # ─── 1. The "Issue" ──────────────────────────────────────────────
  pick-feature:
    executor: external
    description: "GitHub issue"
    prompt: |
      Welcome to Stepwise — workflow orchestration for agents and humans.

      We're going to simulate a real dev workflow: plan, implement in parallel, open a PR, loop through AI code review, and deploy. Everything you see is defined in a single YAML file.

      Pick a feature to "build":
    outputs:
      feature:
        type: choice
        options: [todo-list, auth-system, search-api]
        description: "Feature to implement"

  # ─── 2. Plan ─────────────────────────────────────────────────────
  plan:
    description: "Planning tasks"
    run: |
      revision=$STEPWISE_ATTEMPT
      sleep 2
      if [ "$revision" -ge 2 ]; then
        # Revised plan adds a test task
        case "$feature" in
          todo-list)
            printf '{"tasks": ["data-model", "api-routes", "react-ui", "e2e-tests"], "plan": "4 tasks (added e2e-tests)", "revision": %d}' "$revision"
            ;;
          auth-system)
            printf '{"tasks": ["user-model", "jwt-auth", "login-page", "security-audit"], "plan": "4 tasks (added security-audit)", "revision": %d}' "$revision"
            ;;
          *)
            printf '{"tasks": ["indexer", "query-parser", "results-api", "load-tests"], "plan": "4 tasks (added load-tests)", "revision": %d}' "$revision"
            ;;
        esac
      else
        case "$feature" in
          todo-list)
            printf '{"tasks": ["data-model", "api-routes", "react-ui"], "plan": "3 tasks", "revision": %d}' "$revision"
            ;;
          auth-system)
            printf '{"tasks": ["user-model", "jwt-auth", "login-page"], "plan": "3 tasks", "revision": %d}' "$revision"
            ;;
          *)
            printf '{"tasks": ["indexer", "query-parser", "results-api"], "plan": "3 tasks", "revision": %d}' "$revision"
            ;;
        esac
      fi
    outputs: [tasks, plan, revision]
    inputs:
      feature: pick-feature.feature

  # ─── 3. Approve Plan ────────────────────────────────────────────
  approve-plan:
    executor: external
    description: "Plan review"
    prompt: |
      Feature: $feature — $plan (revision $revision)
      Tasks: $tasks

      External steps like this one pause the workflow and wait for input. That input can come from you here in the web UI, from a CLI command (`stepwise fulfill`), from a webhook, or from a script in your project.

      If you approve, each task fans out as a parallel sub-pipeline. Or revise to re-plan.
    outputs:
      decision:
        type: choice
        options: [approve, revise]
        description: "Approve or revise the plan"
    inputs:
      feature: pick-feature.feature
      tasks: plan.tasks
      plan: plan.plan
      revision: plan.revision
    exits:
      - name: approved
        when: "outputs.decision == 'approve'"
        action: advance
      - name: revise
        when: "True"
        action: loop
        target: plan
        max_iterations: 10

  # ─── 4. Write Code (for-each: fan-out per task) ─────────────────
  #     Each task: implement → test → fix loop back to test
  write-code:
    description: "For-each: writing code"
    for_each: plan.tasks
    as: task
    inputs:
      decision: approve-plan.decision
    when: "decision == 'approve'"
    outputs: [results]
    flow:
      steps:
        task-implement:
          description: "Implementing"
          run: |
            sleep 3
            printf '{"files": 3, "task": "%s", "status": "implemented"}' "$task"
          outputs: [files, task, status]
          inputs:
            task: $job.task
        task-run-tests:
          description: "Running tests"
          run: |
            sleep 2
            if [ "$STEPWISE_ATTEMPT" -ge 2 ]; then
              printf '{"passed": 6, "failed": 0, "status": "pass"}'
            else
              printf '{"passed": 4, "failed": 2, "status": "fail"}'
            fi
          outputs: [passed, failed, status]
          after: [task-implement]
        task-fix:
          description: "Fixing failed tests"
          run: |
            sleep 2
            printf '{"fixes": "applied"}'
          outputs: [fixes]
          inputs:
            status: task-run-tests.status
          when: "status == 'fail'"
          exits:
            - name: retest
              when: "True"
              action: loop
              target: task-run-tests
              max_iterations: 3

  # ─── 5. Integration Tests ───────────────────────────────────────
  #     run-tests advances always; fix-tests fires on failure and loops back
  run-tests:
    description: "Running integration tests"
    run: |
      sleep 3
      if [ "$STEPWISE_ATTEMPT" -ge 2 ]; then
        printf '{"passed": 24, "failed": 0, "status": "pass"}'
      else
        printf '{"passed": 19, "failed": 5, "status": "fail"}'
      fi
    outputs: [passed, failed, status]
    after: [write-code]

  fix-tests:
    description: "Fixing integration tests"
    run: |
      sleep 2
      printf '{"fixes": "applied"}'
    outputs: [fixes]
    inputs:
      status: run-tests.status
    when: "status == 'fail'"
    exits:
      - name: retest
        when: "True"
        action: loop
        target: run-tests
        max_iterations: 5

  # ─── 6. Open PR (sub-flow: push + create) ────────────────────────
  open-pr:
    description: "Opening PR"
    flow:
      steps:
        push-initial:
          description: "Pushing code"
          run: |
            sleep 2
            printf '{"commit": "initial push"}'
          outputs: [commit]
        create-pr:
          description: "Creating PR"
          run: |
            sleep 1
            pr=$(($(printf '%s' "$feature" | cksum | cut -d' ' -f1) % 900 + 100))
            printf '{"pr": "#%d", "branch": "feat/%s", "pr_title": "[%s] %s"}' "$pr" "$feature" "$team_name" "$feature"
          outputs: [pr, branch, pr_title]
          inputs:
            commit: push-initial.commit
            feature: $job.feature
            team_name: $job.team_name
    outputs: [pr, branch, pr_title]
    inputs:
      feature: pick-feature.feature
      team_name: $job.team_name
      test_status: run-tests.status
    when: "test_status == 'pass'"

  # ─── 7. Code Review ─────────────────────────────────────────────
  #     review → revise → push → loop back to review
  await-review:
    description: "AI code review"
    run: |
      sleep 2
      if [ "$STEPWISE_ATTEMPT" -ge 2 ]; then
        printf '{"result": "approved", "reviewer": "ai-copilot", "feedback": ""}'
      else
        printf '{"result": "changes", "reviewer": "ai-copilot", "feedback": "Add input validation and error handling"}'
      fi
    outputs: [result, reviewer, feedback]
    inputs:
      pr: open-pr.pr
      reviewer_style: $job.reviewer_style

  revise-code:
    description: "Revising code"
    run: |
      sleep 2
      printf '{"changes": "revised — addressed: %s"}' "$feedback"
    outputs: [changes]
    inputs:
      result: await-review.result
      feedback: await-review.feedback
    when: "result == 'changes'"

  push-fix:
    description: "Pushing fixes"
    run: |
      sleep 1
      printf '{"pushed": true}'
    outputs: [pushed]
    inputs:
      changes: revise-code.changes
    exits:
      - name: re-review
        when: "True"
        action: loop
        target: await-review
        max_iterations: 5
      - name: stuck
        when: "attempt >= 4"
        action: escalate

  # ─── 8. Deploy Decision ─────────────────────────────────────────
  ship-it:
    executor: external
    description: "Deploy decision"
    prompt: |
      "$pr_title" ($pr) reviewed by $reviewer!

      The review loop just resolved — await-review requested changes, revise-code and push-fix addressed them, then push-fix looped back to await-review which approved on the second pass. An escalate rule at attempt >= 4 would pause if the loop got stuck.

      Now your choice branches the workflow — each downstream step has a `when` condition, so only one path executes and the other is skipped.
    outputs:
      decision:
        type: choice
        options: [deploy, close]
        description: "Ship it?"
    inputs:
      pr: open-pr.pr
      pr_title: open-pr.pr_title
      reviewer: await-review.reviewer
      review_result: await-review.result
      pushed:
        from: push-fix.pushed
        optional: true
    when: "review_result == 'approved'"

  # ─── 9. Deploy or Close ──────────────────────────────────────────
  merge:
    description: "Merging PR"
    run: |
      sleep 1
      printf '{"action": "merged", "pr": "%s", "team": "%s"}' "$pr" "$team_name"
    outputs: [action, pr, team]
    inputs:
      pr: open-pr.pr
      team_name: $job.team_name
      decision: ship-it.decision
    when: "decision == 'deploy'"

  deploy-prod:
    description: "Deploying to prod"
    run: |
      sleep 2
      printf '{"status": "live", "pr_title": "%s"}' "$pr_title"
    outputs: [status, pr_title]
    inputs:
      action: merge.action
      pr_title: open-pr.pr_title

  close-pr:
    description: "Closing PR"
    run: |
      printf '{"status": "closed", "pr_title": "%s"}' "$pr_title"
    outputs: [status, pr_title]
    inputs:
      pr_title: open-pr.pr_title
      decision: ship-it.decision
    when: "decision == 'close'"
