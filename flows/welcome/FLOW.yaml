name: welcome
description: Interactive product tour — learn stepwise by watching it run

steps:
  # ─── Phase 1: Gather Info ───────────────────────────────────────────

  gather-info:
    executor: human
    description: "Human-in-the-loop: gathering your info"
    prompt: |
      Welcome to Stepwise! This flow teaches you by running.
      Watch the DAG above — steps will light up, data will flow.
    outputs:
      name:
        type: str
        description: "Your first name"
      use_case:
        type: choice
        options: [agent-tools, ci-cd, team-workflows, just-exploring]
        description: "What interests you most?"

  # ─── Phase 2: Parallel Tips (fan-out) ──────────────────────────────
  #
  # These three steps run simultaneously — watch the DAG!
  # Each one produces a tip tailored with the user's name.

  tip-dag:
    description: "Parallel: visual DAGs"
    run: |
      printf '{"tip": "Hey %s — steps are DAG nodes, edges carry your data"}' "$name"
    outputs: [tip]
    inputs:
      name: gather-info.name

  tip-hitl:
    description: "Parallel: human-in-the-loop"
    run: |
      printf '{"tip": "%s just used a human step — any step can pause for input"}' "$name"
    outputs: [tip]
    inputs:
      name: gather-info.name

  tip-persistence:
    description: "Parallel: persistence & durability"
    run: |
      printf '{"tip": "Every run persists to SQLite, %s — close and come back anytime"}' "$name"
    outputs: [tip]
    inputs:
      name: gather-info.name

  # ─── Phase 3: Use-Case Advice ──────────────────────────────────────

  build-advice:
    description: "Routing: advice based on your choice"
    run: |
      case "$use_case" in
        agent-tools)
          printf '{"advice": "Run stepwise agent-help for AI agent integration", "next_step": "stepwise agent-help"}'
          ;;
        ci-cd)
          printf '{"advice": "Use stepwise run --wait in CI for structured output", "next_step": "stepwise run --wait"}'
          ;;
        team-workflows)
          printf '{"advice": "Run stepwise serve and share the URL with your team", "next_step": "stepwise serve"}'
          ;;
        *)
          printf '{"advice": "Scaffold a flow and iterate with --watch mode", "next_step": "stepwise new my-flow"}'
          ;;
      esac
    outputs: [advice, next_step]
    inputs:
      use_case: gather-info.use_case

  # ─── Phase 4: Assemble (fan-in) ────────────────────────────────────

  assemble:
    description: "Converging: assembling your personalized guide"
    run: |
      cat <<WELCOME_EOF
      {"welcome_message": "Hey $name! Here's your Stepwise guide.\n\n1. $tip_dag\n\n2. $tip_hitl\n\n3. $tip_persistence\n\nFor $use_case: $advice\n\nTry next: $next_step"}
      WELCOME_EOF
    outputs: [welcome_message]
    inputs:
      name: gather-info.name
      use_case: gather-info.use_case
      tip_dag: tip-dag.tip
      tip_hitl: tip-hitl.tip
      tip_persistence: tip-persistence.tip
      advice: build-advice.advice
      next_step: build-advice.next_step

  # ─── Phase 5: Present Result ────────────────────────────────────────

  present:
    executor: human
    description: "Your personalized welcome"
    prompt: |
      $welcome_message

      That's the tour! See flows/welcome/FLOW.yaml for the source.
    outputs:
      ready:
        type: choice
        options: [lets-go, show-me-more]
        description: "Ready to build your own?"
    inputs:
      welcome_message: assemble.welcome_message
