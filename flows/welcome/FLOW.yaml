name: welcome
description: Interactive product tour — learn stepwise by watching it run

steps:
  # ─── Phase 1: Gather Info ───────────────────────────────────────────

  gather-info:
    executor: human
    description: "Human-in-the-loop: gathering your info"
    prompt: |
      Welcome to Stepwise! This flow is a self-guided tour.

      As it runs, watch the DAG above — you'll see steps light up,
      data flow between them, and the whole pipeline come alive.

      Let's start with a couple quick questions.
    outputs:
      name:
        type: str
        description: "Your first name"
      use_case:
        type: choice
        options: [agent-tools, ci-cd, team-workflows, just-exploring]
        description: "What interests you most?"

  # ─── Phase 2: Parallel Tips (fan-out) ──────────────────────────────
  #
  # These three steps run simultaneously — watch the DAG!
  # Each one produces a tip tailored with the user's name.

  tip-dag:
    description: "Parallel: explaining visual DAGs"
    run: |
      printf '{"tip": "Flows are visual DAGs. Each node is a step, each edge carries data. You can watch execution in real time — no logs to grep, no black boxes."}'
    outputs: [tip]
    inputs:
      name: gather-info.name

  tip-hitl:
    description: "Parallel: explaining human-in-the-loop"
    run: |
      printf '{"tip": "Any step can pause for human input. You just experienced this! Agents can run flows and pause for your approval before continuing."}'
    outputs: [tip]
    inputs:
      name: gather-info.name

  tip-persistence:
    description: "Parallel: explaining persistence"
    run: |
      printf '{"tip": "Every run is saved to SQLite. Close your browser, come back tomorrow — your flow is right where you left it. No work lost."}'
    outputs: [tip]
    inputs:
      name: gather-info.name

  # ─── Phase 3: Use-Case Advice ──────────────────────────────────────

  build-advice:
    description: "Routing: advice based on your choice"
    run: |
      case "$use_case" in
        agent-tools)
          printf '{"advice": "Run stepwise agent-help to generate instructions your AI agent can use to discover and call flows. Try: stepwise schema <flow> for a JSON tool contract.", "next_step": "stepwise agent-help --format compact"}'
          ;;
        ci-cd)
          printf '{"advice": "Use stepwise run --wait in your CI pipeline. It blocks until the flow completes and returns structured JSON. Add human gates for deploy approvals.", "next_step": "stepwise run <flow> --wait"}'
          ;;
        team-workflows)
          printf '{"advice": "Run stepwise serve to start the web server. Share the URL with your team. Everyone can see running jobs, fulfill human steps, and track progress.", "next_step": "stepwise serve"}'
          ;;
        *)
          printf '{"advice": "Start with stepwise new my-flow to scaffold a flow, then stepwise run my-flow --watch to see it execute. Edit the YAML, re-run, iterate.", "next_step": "stepwise new my-flow"}'
          ;;
      esac
    outputs: [advice, next_step]
    inputs:
      use_case: gather-info.use_case

  # ─── Phase 4: Assemble (fan-in) ────────────────────────────────────

  assemble:
    description: "Converging: assembling your personalized guide"
    run: |
      cat <<WELCOME_EOF
      {"welcome_message": "Hey $name! Here is your personalized Stepwise guide.\n\n1. $tip_dag\n\n2. $tip_hitl\n\n3. $tip_persistence\n\nBased on your interest in $use_case:\n$advice\n\nTry this next: $next_step"}
      WELCOME_EOF
    outputs: [welcome_message]
    inputs:
      name: gather-info.name
      use_case: gather-info.use_case
      tip_dag: tip-dag.tip
      tip_hitl: tip-hitl.tip
      tip_persistence: tip-persistence.tip
      advice: build-advice.advice
      next_step: build-advice.next_step

  # ─── Phase 5: Present Result ────────────────────────────────────────

  present:
    executor: human
    description: "Your personalized welcome message"
    prompt: |
      $welcome_message

      ---

      That's the tour! You just experienced:
      - A human-in-the-loop step (this one, and the first)
      - Parallel execution (the three tip steps)
      - Data flowing between steps (check the edge labels)
      - Conditional logic (your advice was customized)

      This flow itself is YAML — check flows/welcome/FLOW.yaml.
      Everything you just saw, you can build.
    outputs:
      ready:
        type: choice
        options: [lets-go, show-me-more]
        description: "Ready to build your own?"
    inputs:
      welcome_message: assemble.welcome_message
