name: welcome
description: "From issue to deploy — a real dev workflow with AI review, config, and escalation"
author: stepwise
tags: [demo, human-in-the-loop, for-each, branching, loops, config, mock-llm, optional-inputs, escalate]

config:
  team_name:
    type: str
    default: "acme-eng"
    description: "Team name displayed in PR titles"
  reviewer_style:
    type: choice
    options: [thorough, quick]
    default: thorough
    description: "AI reviewer thoroughness"

steps:
  # ─── 1. The "Issue" ──────────────────────────────────────────────
  pick-feature:
    executor: external
    description: "GitHub issue"
    prompt: |
      Welcome to Stepwise — workflow orchestration for agents and humans.

      We're going to simulate a real dev workflow: plan, implement in parallel, open a PR, loop through AI code review, and deploy. Everything you see is defined in a single YAML file.

      Pick a feature to "build":
    outputs:
      feature:
        type: choice
        options: [todo-list, auth-system, search-api]
        description: "Feature to implement"

  # ─── 2. Plan ─────────────────────────────────────────────────────
  plan:
    description: "Planning tasks"
    run: |
      revision=$STEPWISE_ATTEMPT
      sleep 2
      case "$feature" in
        todo-list)
          printf '{"tasks": ["data-model", "api-routes", "react-ui"], "plan": "3 tasks", "revision": %d}' "$revision"
          ;;
        auth-system)
          printf '{"tasks": ["user-model", "jwt-auth", "login-page"], "plan": "3 tasks", "revision": %d}' "$revision"
          ;;
        *)
          printf '{"tasks": ["indexer", "query-parser", "results-api"], "plan": "3 tasks", "revision": %d}' "$revision"
          ;;
      esac
    outputs: [tasks, plan, revision]
    inputs:
      feature: pick-feature.feature

  # ─── 3. Approve Plan ────────────────────────────────────────────
  approve-plan:
    executor: external
    description: "Plan review"
    prompt: |
      Feature: $feature — $plan (revision $revision)
      Tasks: $tasks

      External steps like this one pause the workflow and wait for input. That input can come from you here in the web UI, from a CLI command (`stepwise fulfill`), from a webhook, or from a script in your project.

      If you approve, each task fans out as a parallel sub-pipeline. Or revise to re-plan.
    outputs:
      decision:
        type: choice
        options: [approve, revise]
        description: "Approve or revise the plan"
    inputs:
      feature: pick-feature.feature
      tasks: plan.tasks
      plan: plan.plan
      revision: plan.revision
    exits:
      - name: approved
        when: "outputs.decision == 'approve'"
        action: advance
      - name: revise
        when: "True"
        action: loop
        target: plan
        max_iterations: 10

  # ─── 4. Write Code (for-each: fan-out per task) ─────────────────
  #     Each task: implement → test → fix loop back to test
  write-code:
    description: "For-each: writing code"
    for_each: plan.tasks
    as: task
    inputs:
      tasks: plan.tasks
      decision: approve-plan.decision
    outputs: [results]
    flow:
      steps:
        task-implement:
          description: "Implementing"
          run: |
            sleep 3
            printf '{"files": 3, "task": "%s"}' "$task"
          outputs: [files, task]
          inputs:
            task: $job.task
        task-run-tests:
          description: "Running unit tests"
          run: |
            sleep 2
            if [ "$STEPWISE_ATTEMPT" -ge 2 ]; then
              printf '{"passed": 6, "failed": 0, "status": "pass"}'
            else
              printf '{"passed": 4, "failed": 2, "status": "fail"}'
            fi
          outputs: [passed, failed, status]
          sequencing: [task-implement]
          exits:
            - name: pass
              when: "outputs.status == 'pass'"
              action: advance
            - name: fail
              when: "True"
              action: loop
              target: task-fix
              max_iterations: 3
        task-fix:
          description: "Fixing tests"
          run: |
            sleep 1
            printf '{"fixes": "applied"}'
          outputs: [fixes]
          sequencing: [task-run-tests]
          exits:
            - name: retest
              when: "True"
              action: loop
              target: task-run-tests

  # ─── 5. Integration Tests ───────────────────────────────────────
  #     Loops back to fix-tests on failure
  run-tests:
    description: "Running integration tests"
    run: |
      sleep 3
      if [ "$STEPWISE_ATTEMPT" -ge 2 ]; then
        printf '{"passed": 11, "failed": 0, "status": "pass"}'
      else
        printf '{"passed": 8, "failed": 3, "status": "fail"}'
      fi
    outputs: [passed, failed, status]
    sequencing: [write-code]
    exits:
      - name: pass
        when: "outputs.status == 'pass'"
        action: advance
      - name: fail
        when: "True"
        action: loop
        target: fix-tests
        max_iterations: 5

  tests-ok:
    description: "Tests passed"
    run: |
      printf '{"result": "passed"}'
    outputs: [result]
    inputs:
      status: run-tests.status
    when: "status == 'pass'"

  fix-tests:
    description: "Fixing tests"
    run: |
      sleep 2
      printf '{"fixes": "applied"}'
    outputs: [fixes]
    inputs:
      status: run-tests.status
    when: "status == 'fail'"

  # ─── 6. Open PR (sub-flow: push + create) ────────────────────────
  open-pr:
    description: "Opening PR"
    flow:
      steps:
        push-initial:
          description: "Pushing code"
          run: |
            sleep 2
            printf '{"commit": "initial push"}'
          outputs: [commit]
        create-pr:
          description: "Creating PR"
          run: |
            sleep 1
            pr=$(($(printf '%s' "$feature" | cksum | cut -d' ' -f1) % 900 + 100))
            printf '{"pr": "#%d", "branch": "feat/%s", "pr_title": "[%s] %s"}' "$pr" "$feature" "$team_name" "$feature"
          outputs: [pr, branch, pr_title]
          inputs:
            commit: push-initial.commit
            feature: $job.feature
            team_name: $job.team_name
    outputs: [pr, branch, pr_title]
    inputs:
      feature: pick-feature.feature
      team_name: $job.team_name
      test_result: tests-ok.result

  # ─── 7. Code Review ─────────────────────────────────────────────
  #     mock_llm simulates an AI reviewer; loops revise→push→review
  await-review:
    executor: mock_llm
    description: "AI code review"
    responses:
      await-review:
        result: "changes"
        reviewer: "ai-copilot"
        feedback: "Add input validation and error handling"
    outputs: [result, reviewer, feedback]
    inputs:
      pr: open-pr.pr
      reviewer_style: $job.reviewer_style

  revise-code:
    description: "Revising code"
    run: |
      sleep 2
      printf '{"changes": "revised — addressed: %s"}' "$feedback"
    outputs: [changes]
    inputs:
      result: await-review.result
      feedback:
        from: await-review.feedback
        optional: true
    when: "result != 'approved'"

  push-fix:
    description: "Pushing fixes"
    run: |
      sleep 1
      printf '{"pushed": true}'
    outputs: [pushed]
    inputs:
      changes: revise-code.changes

  re-review:
    description: "Re-reviewing"
    run: |
      sleep 2
      if [ "$STEPWISE_ATTEMPT" -ge 2 ]; then
        printf '{"outcome": "approved"}'
      else
        printf '{"outcome": "changes"}'
      fi
    outputs: [outcome]
    inputs:
      pushed: push-fix.pushed
    exits:
      - name: approved
        when: "outputs.outcome == 'approved'"
        action: advance
      - name: stuck
        when: "attempt >= 4"
        action: escalate
      - name: changes
        when: "True"
        action: loop
        target: revise-code
        max_iterations: 5

  # ─── 8. Deploy Decision ─────────────────────────────────────────
  ship-it:
    executor: external
    description: "Deploy decision"
    prompt: |
      "$pr_title" ($pr) reviewed by $reviewer!

      The review loop just resolved — revise-code, push-fix, and re-review
      cycled until approved. An escalate exit rule at attempt >= 4 would
      pause the job if the loop got stuck.

      Now your choice branches the workflow — each downstream step has a
      `when` condition, so only one path executes and the other is skipped.
    outputs:
      decision:
        type: choice
        options: [deploy, close]
        description: "Ship it?"
    inputs:
      pr: open-pr.pr
      pr_title: open-pr.pr_title
      reviewer: await-review.reviewer
      review_outcome: re-review.outcome

  # ─── 9. Deploy or Close ──────────────────────────────────────────
  merge:
    description: "Merging PR"
    run: |
      sleep 1
      printf '{"action": "merged", "pr": "%s", "team": "%s"}' "$pr" "$team_name"
    outputs: [action, pr, team]
    inputs:
      pr: open-pr.pr
      team_name: $job.team_name
      decision: ship-it.decision
    when: "decision == 'deploy'"

  deploy-prod:
    description: "Deploying to prod"
    run: |
      sleep 2
      printf '{"status": "live", "pr_title": "%s"}' "$pr_title"
    outputs: [status, pr_title]
    inputs:
      action: merge.action
      pr_title: open-pr.pr_title

  close-pr:
    description: "Closing PR"
    run: |
      printf '{"status": "closed", "pr_title": "%s"}' "$pr_title"
    outputs: [status, pr_title]
    inputs:
      pr_title: open-pr.pr_title
      decision: ship-it.decision
    when: "decision == 'close'"
