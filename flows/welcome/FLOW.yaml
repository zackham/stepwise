name: welcome
description: "From issue to deploy — a real dev workflow in one YAML file"

steps:
  # ─── 1. The "Issue" ──────────────────────────────────────────────
  pick-feature:
    executor: human
    description: "GitHub issue"
    prompt: |
      Welcome to Stepwise — workflow orchestration for agents and humans.

      We're going to simulate a real dev workflow: plan, implement
      in parallel, open a PR, loop through code review, and deploy.
      Everything you see is defined in a single YAML file.

      Pick a feature to "build":
    outputs:
      feature:
        type: choice
        options: [todo-list, auth-system, search-api]
        description: "Feature to implement"

  # ─── 2. Plan ─────────────────────────────────────────────────────
  plan:
    description: "Planning tasks"
    run: |
      sleep 1
      rev_file=".plan-revision"
      if [ -f "$rev_file" ]; then
        rev=$(cat "$rev_file")
        rev=$((rev + 1))
      else
        rev=1
      fi
      printf '%d' "$rev" > "$rev_file"
      case "$feature" in
        todo-list)
          printf '{"tasks": ["data-model", "api-routes", "react-ui"], "plan": "3 tasks", "revision": %d}' "$rev"
          ;;
        auth-system)
          printf '{"tasks": ["user-model", "jwt-auth", "login-page"], "plan": "3 tasks", "revision": %d}' "$rev"
          ;;
        *)
          printf '{"tasks": ["indexer", "query-parser", "results-api"], "plan": "3 tasks", "revision": %d}' "$rev"
          ;;
      esac
    outputs: [tasks, plan, revision]
    inputs:
      feature: pick-feature.feature

  # ─── 3. Approve Plan ────────────────────────────────────────────
  approve-plan:
    executor: human
    description: "Plan review"
    prompt: |
      Feature: $feature — $plan (revision $revision)
      Tasks: $tasks

      Human steps like this one pause the entire workflow. In production, this could send a Slack message or email instead.

      If you approve, each task fans out as a parallel sub-pipeline. Or revise to re-plan.
    outputs:
      decision:
        type: choice
        options: [approve, revise]
        description: "Approve or revise the plan"
    inputs:
      feature: pick-feature.feature
      tasks: plan.tasks
      plan: plan.plan
      revision: plan.revision
    exits:
      - name: approved
        when: "outputs.decision == 'approve'"
        action: advance
      - name: revise
        when: "outputs.decision == 'revise'"
        action: loop
        target: plan

  # ─── 4. Write Code (for-each: fan-out per task) ─────────────────
  #     Each task: implement → test → branch (pass or fix loop)
  write-code:
    description: "For-each: writing code"
    for_each: plan.tasks
    as: task
    inputs:
      tasks: plan.tasks
    sequencing: [approve-plan]
    outputs: [results]
    flow:
      steps:
        task-implement:
          description: "Implementing"
          run: |
            sleep 2
            printf '{"files": 3, "task": "%s"}' "$task"
          outputs: [files, task]
          inputs:
            task: $job.task
        task-run-tests:
          description: "Running unit tests"
          run: |
            sleep 1
            printf '{"passed": 4, "failed": 2, "status": "fail"}'
          outputs: [passed, failed, status]
          sequencing: [task-implement]
          exits:
            - name: pass
              when: "outputs.status == 'pass'"
              action: advance
              target: task-done
            - name: fail
              when: "True"
              action: advance
              target: task-fix
        task-done:
          description: "Tests passed"
          run: |
            printf '{"result": "passed"}'
          outputs: [result]
          sequencing: [task-run-tests]
        task-fix:
          description: "Fixing tests"
          run: |
            sleep 1
            printf '{"fixes": "applied"}'
          outputs: [fixes]
          sequencing: [task-run-tests]
        task-retest:
          description: "Re-running tests"
          run: |
            sleep 1
            if [ "$STEPWISE_ATTEMPT" -ge 2 ]; then
              printf '{"result": "passed"}'
            else
              printf '{"result": "still failing"}'
            fi
          outputs: [result]
          inputs:
            fixes: task-fix.fixes
          exits:
            - name: pass
              when: "outputs.result == 'passed'"
              action: advance
            - name: fail
              when: "True"
              action: loop
              target: task-fix

  # ─── 5. Integration Tests ───────────────────────────────────────
  #     Branch: pass (advance) or fail (fix loop)
  run-tests:
    description: "Running integration tests"
    run: |
      sleep 1
      printf '{"passed": 8, "failed": 3, "status": "fail"}'
    outputs: [passed, failed, status]
    sequencing: [write-code]
    exits:
      - name: pass
        when: "outputs.status == 'pass'"
        action: advance
        target: tests-ok
      - name: fail
        when: "True"
        action: advance
        target: fix-tests

  tests-ok:
    description: "Tests passed"
    run: |
      printf '{"result": "passed"}'
    outputs: [result]
    sequencing: [run-tests]

  fix-tests:
    description: "Fixing tests"
    run: |
      sleep 1
      printf '{"fixes": "applied"}'
    outputs: [fixes]
    sequencing: [run-tests]

  rerun-tests:
    description: "Re-running tests"
    run: |
      sleep 1
      if [ "$STEPWISE_ATTEMPT" -ge 2 ]; then
        printf '{"result": "passed"}'
      else
        printf '{"result": "still failing"}'
      fi
    outputs: [result]
    inputs:
      fixes: fix-tests.fixes
    exits:
      - name: pass
        when: "outputs.result == 'passed'"
        action: advance
      - name: fail
        when: "True"
        action: loop
        target: fix-tests

  # ─── 6. Open PR (sub-flow: push + create) ────────────────────────
  open-pr:
    description: "Opening PR"
    flow:
      steps:
        push-initial:
          description: "Pushing code"
          run: |
            sleep 1
            printf '{"commit": "initial push"}'
          outputs: [commit]
        create-pr:
          description: "Creating PR"
          run: |
            sleep 1
            raw=$(od -A n -N 1 -t u1 /dev/urandom | tr -d ' \n')
            raw=${raw:-128}
            pr=$((raw % 900 + 100))
            printf '{"pr": "#%d", "branch": "feat/%s", "pr_title": "New Feature: %s"}' "$pr" "$feature" "$feature"
          outputs: [pr, branch, pr_title]
          inputs:
            commit: push-initial.commit
            feature: $job.feature
    outputs: [pr, branch, pr_title]
    inputs:
      feature: pick-feature.feature
      test_result:
        any_of:
          - tests-ok.result
          - rerun-tests.result

  # ─── 7. Code Review ─────────────────────────────────────────────
  #     Branch: approved (advance) or changes (revise loop)
  await-review:
    description: "Code review"
    run: |
      sleep 2
      printf '{"result": "changes", "reviewer": "alice"}'
    outputs: [result, reviewer]
    inputs:
      pr: open-pr.pr
    exits:
      - name: approved
        when: "outputs.result == 'approved'"
        action: advance
        target: review-ok
      - name: changes
        when: "True"
        action: advance
        target: revise-code

  review-ok:
    description: "Review approved"
    run: |
      printf '{"outcome": "approved"}'
    outputs: [outcome]
    sequencing: [await-review]

  revise-code:
    description: "Revising code"
    run: |
      sleep 2
      printf '{"changes": "revised"}'
    outputs: [changes]
    sequencing: [await-review]

  push-fix:
    description: "Pushing fixes"
    run: |
      sleep 1
      printf '{"pushed": true}'
    outputs: [pushed]
    inputs:
      changes: revise-code.changes

  re-review:
    description: "Re-reviewing"
    run: |
      sleep 2
      if [ "$STEPWISE_ATTEMPT" -ge 2 ]; then
        printf '{"outcome": "approved"}'
      else
        printf '{"outcome": "changes"}'
      fi
    outputs: [outcome]
    inputs:
      pushed: push-fix.pushed
    exits:
      - name: approved
        when: "outputs.outcome == 'approved'"
        action: advance
      - name: changes
        when: "True"
        action: loop
        target: revise-code

  # ─── 8. Deploy Decision ─────────────────────────────────────────
  ship-it:
    executor: human
    description: "Deploy decision"
    prompt: |
      "$pr_title" ($pr) approved by $reviewer!

      The review loop just resolved — revise-code, push-fix, and re-review cycled until approved. That loop-back edge in the DAG is an exit rule.

      Now your choice branches the workflow — only one path executes, and the other is skipped.
    outputs:
      decision:
        type: choice
        options: [deploy, close]
        description: "Ship it?"
    inputs:
      pr: open-pr.pr
      pr_title: open-pr.pr_title
      reviewer: await-review.reviewer
      review_outcome:
        any_of:
          - review-ok.outcome
          - re-review.outcome
    exits:
      - name: deploy
        when: "outputs.decision == 'deploy'"
        action: advance
        target: merge
      - name: close
        when: "outputs.decision == 'close'"
        action: advance
        target: close-pr

  # ─── 9. Deploy or Close ──────────────────────────────────────────
  merge:
    description: "Merging PR"
    run: |
      sleep 1
      printf '{"action": "merged", "pr": "%s"}' "$pr"
    outputs: [action, pr]
    inputs:
      pr: open-pr.pr
    sequencing: [ship-it]

  deploy-prod:
    description: "Deploying to prod"
    run: |
      sleep 2
      printf '{"status": "live", "pr_title": "%s"}' "$pr_title"
    outputs: [status, pr_title]
    inputs:
      action: merge.action
      pr_title: open-pr.pr_title

  close-pr:
    description: "Closing PR"
    run: |
      sleep 1
      printf '{"status": "closed", "pr_title": "%s"}' "$pr_title"
    outputs: [status, pr_title]
    inputs:
      pr_title: open-pr.pr_title
    sequencing: [ship-it]
