name: test-polling
description: "Validate polling executor reliability — file-based polling, restart survival, long-running polls, simulated backoff"
author: stepwise
tags: [test, polling, reliability]

config:
  basic_delay_seconds:
    type: str
    default: "5"
    description: "Seconds before basic marker file appears"
  longrun_delay_seconds:
    type: str
    default: "360"
    description: "Seconds before long-run marker file appears (>5 min default)"
  backoff_fail_count:
    type: str
    default: "4"
    description: "Number of poll checks that fail before backoff succeeds"

steps:
  # ═══ Test 1: Basic file-based polling ═══════════════════════════════════
  setup-basic:
    description: "Create marker file after delay"
    run: bash scripts/setup-marker.sh basic
    inputs:
      delay_seconds: $job.basic_delay_seconds
    outputs: [marker_path]

  poll-basic:
    description: "Poll for basic marker file"
    executor: poll
    check_command: |
      if [ -f "$marker_path" ]; then
        cat "$marker_path"
      fi
    interval_seconds: 2
    prompt: "Waiting for basic marker file..."
    inputs:
      marker_path: setup-basic.marker_path
    outputs: [ready]

  # ═══ Test 2: Server restart survival ════════════════════════════════════
  setup-restart:
    description: "Create marker file with 30s delay for restart test"
    run: bash scripts/setup-marker.sh restart 30
    outputs: [marker_path]

  poll-restart:
    description: "Poll survives server restart"
    executor: poll
    check_command: |
      if [ -f "$marker_path" ]; then
        cat "$marker_path"
      fi
    interval_seconds: 5
    prompt: |
      Server restart test: run 'stepwise server restart' now, then wait for the
      marker at $marker_path to appear. If the poll resumes after restart, the test passes.
    inputs:
      marker_path: setup-restart.marker_path
    outputs: [ready]

  # ═══ Test 3: Long-running poll (>5 min) ═════════════════════════════════
  setup-longrun:
    description: "Create marker file with long delay"
    run: bash scripts/setup-marker.sh longrun
    inputs:
      delay_seconds: $job.longrun_delay_seconds
    outputs: [marker_path]

  poll-longrun:
    description: "Long-running poll (default 6 min)"
    executor: poll
    check_command: |
      if [ -f "$marker_path" ]; then
        cat "$marker_path"
      fi
    interval_seconds: 30
    prompt: "Long-running poll — checking every 30s for up to $longrun_delay_seconds seconds"
    inputs:
      marker_path: setup-longrun.marker_path
      longrun_delay_seconds: $job.longrun_delay_seconds
    outputs: [ready]

  # ═══ Test 4: Simulated backoff ══════════════════════════════════════════
  setup-backoff:
    description: "Create state directory for backoff tracking"
    run: |
      state_dir="$(pwd)/backoff-state"
      mkdir -p "$state_dir"
      markers_dir="$(pwd)/markers"
      mkdir -p "$markers_dir"
      marker_path="$markers_dir/backoff.json"
      printf '{"marker_path": "%s", "state_dir": "%s", "max_fails": "%s"}' \
        "$marker_path" "$state_dir" "$max_fails"
    inputs:
      max_fails: $job.backoff_fail_count
    outputs: [marker_path, state_dir, max_fails]

  poll-backoff:
    description: "Poll with simulated backoff"
    executor: poll
    check_command: |
      count_file="$state_dir/attempt_count"
      n=0; [ -f "$count_file" ] && n=$(cat "$count_file")
      n=$((n + 1)); echo "$n" > "$count_file"
      echo "Attempt $n of $max_fails" >&2
      if [ "$n" -gt "$max_fails" ]; then
        printf '{"ready": true, "attempts": %d}' "$n"
      fi
    interval_seconds: 3
    prompt: "Backoff simulation — fails $max_fails times before succeeding"
    inputs:
      marker_path: setup-backoff.marker_path
      state_dir: setup-backoff.state_dir
      max_fails: setup-backoff.max_fails
    outputs: [ready, attempts]

  # ═══ Summary ════════════════════════════════════════════════════════════
  summarize:
    description: "Collect results from all poll tests"
    run: |
      basic_ok="false"; [ "$basic_ready" = "True" ] && basic_ok="true"
      restart_ok="false"; [ "$restart_ready" = "True" ] && restart_ok="true"
      longrun_ok="false"; [ "$longrun_ready" = "True" ] && longrun_ok="true"
      backoff_ok="false"; [ "$backoff_ready" = "True" ] && backoff_ok="true"
      all="false"
      if [ "$basic_ok" = "true" ] && [ "$restart_ok" = "true" ] && [ "$longrun_ok" = "true" ] && [ "$backoff_ok" = "true" ]; then
        all="true"
      fi
      printf '{"basic_passed": %s, "restart_passed": %s, "longrun_passed": %s, "backoff_passed": %s, "all_passed": %s}' \
        "$basic_ok" "$restart_ok" "$longrun_ok" "$backoff_ok" "$all"
    inputs:
      basic_ready: poll-basic.ready
      restart_ready: poll-restart.ready
      longrun_ready: poll-longrun.ready
      backoff_ready: poll-backoff.ready
    outputs: [basic_passed, restart_passed, longrun_passed, backoff_passed, all_passed]
