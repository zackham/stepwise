name: test-polling
description: "Validate polling executor reliability — file-based polling, restart survival, long-running polls, simulated backoff"
author: stepwise
tags: [test, polling, reliability]

config:
  basic_delay_seconds:
    type: str
    default: "5"
    description: "Seconds before basic marker file appears"
  longrun_delay_seconds:
    type: str
    default: "360"
    description: "Seconds before long-run marker file appears (>5 min default)"
  backoff_fail_count:
    type: str
    default: "4"
    description: "Number of poll checks that fail before backoff succeeds"

steps:
  # ═══ Test 1: Basic file-based polling ═══════════════════════════════════
  setup-basic:
    description: "Create marker file after delay"
    run: |
      markers_dir="$(pwd)/markers"
      mkdir -p "$markers_dir"
      marker_path="$markers_dir/basic.json"
      ( sleep "$delay_seconds" && printf '{"ready": true, "marker_id": "basic", "delay_seconds": %s}' "$delay_seconds" > "$marker_path" ) &
      printf '{"marker_path": "%s", "flow_dir": "%s"}' "$marker_path" "$STEPWISE_FLOW_DIR"
    inputs:
      delay_seconds: $job.basic_delay_seconds
    outputs: [marker_path, flow_dir]

  poll-basic:
    description: "Poll for basic marker file"
    executor: poll
    check_command: bash $flow_dir/scripts/check-marker.sh $marker_path
    interval_seconds: 2
    prompt: "Polling for basic marker file (delay: $basic_delay_seconds seconds)"
    inputs:
      marker_path: setup-basic.marker_path
      flow_dir: setup-basic.flow_dir
      basic_delay_seconds: $job.basic_delay_seconds
    outputs: [ready, marker_id, delay_seconds]

  # ═══ Test 2: Server restart survival ════════════════════════════════════
  setup-restart:
    description: "Create marker file with 30s delay for restart test"
    run: |
      markers_dir="$(pwd)/markers"
      mkdir -p "$markers_dir"
      marker_path="$markers_dir/restart.json"
      ( sleep 30 && printf '{"ready": true, "marker_id": "restart", "delay_seconds": 30}' > "$marker_path" ) &
      printf '{"marker_path": "%s", "flow_dir": "%s"}' "$marker_path" "$STEPWISE_FLOW_DIR"
    outputs: [marker_path, flow_dir]

  poll-restart:
    description: "Poll survives server restart"
    executor: poll
    check_command: bash $flow_dir/scripts/check-marker.sh $marker_path
    interval_seconds: 5
    prompt: |
      Restart test — marker appears in ~30s.
      Try: stepwise server restart
      Known gap: poll timer is NOT re-scheduled after restart (engine.py:2502).
    inputs:
      marker_path: setup-restart.marker_path
      flow_dir: setup-restart.flow_dir
    outputs: [ready, marker_id, delay_seconds]

  # ═══ Test 3: Long-running poll (>5 min) ═════════════════════════════════
  setup-longrun:
    description: "Create marker file with long delay"
    run: |
      markers_dir="$(pwd)/markers"
      mkdir -p "$markers_dir"
      marker_path="$markers_dir/longrun.json"
      ( sleep "$delay_seconds" && printf '{"ready": true, "marker_id": "longrun", "delay_seconds": %s}' "$delay_seconds" > "$marker_path" ) &
      printf '{"marker_path": "%s", "flow_dir": "%s"}' "$marker_path" "$STEPWISE_FLOW_DIR"
    inputs:
      delay_seconds: $job.longrun_delay_seconds
    outputs: [marker_path, flow_dir]

  poll-longrun:
    description: "Long-running poll (default 6 min)"
    executor: poll
    check_command: bash $flow_dir/scripts/check-marker.sh $marker_path
    interval_seconds: 30
    prompt: "Long-running poll — waiting $longrun_delay_seconds seconds"
    inputs:
      marker_path: setup-longrun.marker_path
      flow_dir: setup-longrun.flow_dir
      longrun_delay_seconds: $job.longrun_delay_seconds
    outputs: [ready, marker_id, delay_seconds]

  # ═══ Test 4: Simulated backoff ══════════════════════════════════════════
  setup-backoff:
    description: "Create state directory for backoff tracking"
    run: |
      state_dir="$(pwd)/backoff-state"
      mkdir -p "$state_dir"
      markers_dir="$(pwd)/markers"
      mkdir -p "$markers_dir"
      marker_path="$markers_dir/backoff.json"
      printf '{"marker_path": "%s", "state_dir": "%s", "flow_dir": "%s"}' \
        "$marker_path" "$state_dir" "$STEPWISE_FLOW_DIR"
    outputs: [marker_path, state_dir, flow_dir]

  poll-backoff:
    description: "Poll with simulated backoff"
    executor: poll
    check_command: bash $flow_dir/scripts/check-backoff.sh $marker_path $state_dir $max_fails
    interval_seconds: 3
    prompt: "Backoff simulation — fails $max_fails times before succeeding"
    inputs:
      marker_path: setup-backoff.marker_path
      state_dir: setup-backoff.state_dir
      flow_dir: setup-backoff.flow_dir
      max_fails: $job.backoff_fail_count
    outputs: [ready, attempts, max_fails]

  # ═══ Summary ════════════════════════════════════════════════════════════
  summarize:
    description: "Collect results from all poll tests"
    run: |
      printf '{"basic": "%s", "restart": "%s", "longrun": "%s", "backoff": "%s", "all_passed": true}' \
        "$basic_ready" "$restart_ready" "$longrun_ready" "$backoff_ready"
    inputs:
      basic_ready: poll-basic.ready
      restart_ready: poll-restart.ready
      longrun_ready: poll-longrun.ready
      backoff_ready: poll-backoff.ready
    outputs: [basic, restart, longrun, backoff, all_passed]
